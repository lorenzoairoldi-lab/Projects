name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # AUTH SERVICE — 17 test
  # ──────────────────────────────────────────────
  test-auth:
    name: Test Auth Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: services/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────
  # WORKOUT SERVICE — 8 test
  # ──────────────────────────────────────────────
  test-workout:
    name: Test Workout Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/workout-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: services/workout-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────
  # STATS SERVICE — 14 test
  # ──────────────────────────────────────────────
  test-stats:
    name: Test Stats Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/stats-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: services/stats-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────
  # FRONTEND — build check (no test, ma verifica
  # che il bundle compili senza errori)
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

  # ──────────────────────────────────────────────
  # DOCKER BUILD — solo su push a master,
  # dopo che tutti i test sono passati
  # ──────────────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-auth, test-workout, test-stats, build-frontend]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: auth-service
            context: services/auth-service
          - name: workout-service
            context: services/workout-service
          - name: stats-service
            context: services/stats-service
          - name: frontend
            context: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          IMAGE_ID=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          # GitHub converte in lowercase — lo facciamo esplicitamente
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          VERSION=${{ github.sha }}

          docker build -t $IMAGE_ID:$VERSION -t $IMAGE_ID:latest ./${{ matrix.service.context }}
          docker push $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:latest
