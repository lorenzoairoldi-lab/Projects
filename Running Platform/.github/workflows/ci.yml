name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # CI — test su ogni push / PR
  # ──────────────────────────────────────────────
  ci:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: Test Auth Service
            dir: services/auth-service
            cmd: npm test
          - label: Test Workout Service
            dir: services/workout-service
            cmd: npm test
          - label: Test Stats Service
            dir: services/stats-service
            cmd: npm test
          - label: Build Frontend
            dir: frontend
            cmd: npm run build
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.cmd }}
        run: ${{ matrix.cmd }}

  # ──────────────────────────────────────────────
  # CD — build immagini Docker su push a master
  #       (dopo che tutta la CI è passata)
  # ──────────────────────────────────────────────
  docker:
    name: Build & Push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: auth-service
            context: services/auth-service
          - name: workout-service
            context: services/workout-service
          - name: stats-service
            context: services/stats-service
          - name: frontend
            context: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          IMAGE_ID=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          VERSION=${{ github.sha }}

          docker build -t $IMAGE_ID:$VERSION -t $IMAGE_ID:latest ./${{ matrix.service.context }}
          docker push $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:latest
